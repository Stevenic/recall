# Backend Engineer — Story Arcs
# 20 arcs across 1,000 days. Designed to stress decision tracking,
# cross-reference, and synthesis while providing secondary coverage
# for all other categories.
#
# Max concurrent arcs: 4 (by design; see §4.2 constraint)
# Quiet periods: ~days 370-380 (holiday break), ~days 730-745 (sabbatical)

arcs:

  # ── Projects ───────────────────────────────────────────────────────────────

  - id: auth-migration
    type: project
    title: "Auth migration: sessions → JWT"
    description: |
      Replace legacy Express-session auth with JWT access/refresh tokens.
      Involves token rotation, session invalidation, backward-compat shim
      for mobile clients, and a phased rollout (internal → beta → GA).
      Cross-references the caching decision (shared Redis dependency).
    startDay: 15
    endDay: 145
    directives:
      - day: 15
        event: "Kickoff meeting for auth migration; reviewed current Express-session implementation and identified 3 breaking changes for mobile clients on v2.3 and below"
      - day: 28
        event: "Completed JWT token rotation design doc (ADR-007); chose RS256 over HS256 for token signing to support key rotation without redeploying services"
      - day: 35
        event: "Design review with team — agreed on 15-minute access token TTL and 7-day refresh token TTL; Alex raised concern about token size in headers for the order service"
      - day: 55
        event: "Prototyped backward-compat shim that translates session cookies to JWT for mobile clients still on v2.3; shim checks legacy sessions in Postgres before falling through to JWT path"
      - day: 65
        event: "Internal rollout begins — all Nexus employees switched to JWT auth; set up Grafana dashboard tracking token issuance rate, refresh rate, and error rate"
      - day: 78
        event: "Discovered refresh token rotation bug — old refresh tokens not being invalidated after use, creating a token replay window of up to 7 days; emergency fix PR opened"
      - day: 93
        event: "Fixed connection pool leak in backward-compat shim identified during db-pool incident post-mortem; shim rewritten with try-finally to guarantee connection release on both session-found and JWT paths"
      - day: 105
        event: "Beta rollout to 10% of external traffic via feature flag; monitoring dashboard shows 0.02% token error rate, all from expired refresh tokens on slow mobile connections"
      - day: 125
        event: "Beta expanded to 50% of external traffic — zero token-related errors in 14 days of monitoring; mobile team confirmed v2.3 shim working correctly"
      - day: 138
        event: "GA rollout complete — 100% of users on JWT auth; legacy Express-session Redis store marked for decommission next sprint"
      - day: 145
        event: "Auth migration retro and ADR-007 finalized; total migration took 130 days across 47 PRs with 1 security bug (token replay) and 1 production incident (connection pool leak)"

  - id: payments-v2
    type: project
    title: "Payment processing v2"
    description: |
      Rebuild the payment pipeline from a single-currency Stripe integration
      to multi-currency support with subscription billing. Includes webhook
      reliability work. Shares infrastructure concerns with auth (token
      storage) and later the GraphQL layer (API surface).
    startDay: 180
    endDay: 380

  - id: graphql-layer
    type: project
    title: "GraphQL API gateway"
    description: |
      Introduce an Apollo-based GraphQL gateway that federates existing REST
      microservices. Triggers the API versioning decision. Overlaps with
      payments-v2 during the transition period. Uses the DDD patterns River
      is learning.
    startDay: 320
    endDay: 520

  - id: multi-tenant
    type: project
    title: "Multi-tenant data isolation"
    description: |
      Migrate from shared-schema Postgres to schema-per-tenant for enterprise
      tier. Involves connection pooling changes (echoes the earlier pool
      incident), migration tooling, and a phased rollback plan. Shares the
      observability stack with event-driven migration.
    startDay: 500
    endDay: 750

  - id: event-driven
    type: project
    title: "Event-driven architecture migration"
    description: |
      Replace synchronous REST calls between core services with NATS-based
      event bus. Motivation: reduce cascading failures seen in incidents.
      Reuses patterns from DDD learning arc. Final major project in timeline.
    startDay: 700
    endDay: 950

  # ── Incidents ──────────────────────────────────────────────────────────────

  - id: incident-db-pool
    type: incident
    title: "Database connection pool exhaustion"
    description: |
      Production outage on day 85. Investigation reveals leaked connections
      from the auth migration's backward-compat shim. Root cause confirmed
      day 90, fix deployed day 93. Post-mortem on day 95. Cross-references
      auth-migration arc.
    startDay: 85
    endDay: 95
    directives:
      - day: 85
        event: "Production alerts fired at 2:47 AM Pacific — Postgres connection pool exhausted with 450 active connections against a pool max of 100; all API requests returning 503 for 23 minutes before on-call (River) scaled pool to 200 as a temporary mitigation"
      - day: 87
        event: "Investigation narrowed the leak to the auth migration backward-compat shim; connection count correlates with traffic from mobile clients on v2.3 that hit the session-lookup fallback path"
      - day: 90
        event: "Root cause confirmed — the shim acquires a Postgres connection to check legacy sessions but only releases it on the session-found branch; when the JWT path is taken instead, the connection leaks. Alex reviewed the fix PR and caught a second leak in the error-handling path"
      - day: 93
        event: "Fix deployed to production — shim rewritten with try-finally to guarantee connection release on all code paths; connection pool stabilized at 35 active connections within 10 minutes of deploy"
      - day: 95
        event: "Post-mortem held with full team — action items: (1) add PgBouncer connection pool monitoring with alert at 60% utilization, (2) add connection cleanup to code review checklist, (3) require try-finally pattern for all database connection acquisition in the style guide"

  - id: incident-webhooks
    type: incident
    title: "Payment webhook delivery failures"
    description: |
      Stripe webhooks silently failing for 48 hours. Discovered via customer
      complaint, not monitoring. Root cause: payload signature verification
      broke after a Stripe API version bump. Leads to the observability
      decision later.
    startDay: 475
    endDay: 490

  - id: incident-memory-leak
    type: incident
    title: "Worker process memory leak"
    description: |
      Gradual memory growth in the background job worker. Investigation
      traces it to unbounded cache in the tenant resolution middleware
      (related to multi-tenant project). Fix involves switching to LRU
      with TTL. Cross-references the caching decision from earlier.
    startDay: 620
    endDay: 640

  # ── Decisions ──────────────────────────────────────────────────────────────

  - id: decision-caching
    type: decision
    title: "Caching layer: Redis → Postgres materialized views"
    description: |
      Initially chose Redis for query caching (day ~140). Benchmarks on
      day 158 show Postgres materialized views outperform Redis 3x for
      the read-heavy workload while eliminating an infra dependency.
      Decision reversed on day 161. Key decision-tracking arc.
    startDay: 140
    endDay: 200

  - id: decision-monorepo
    type: decision
    title: "Monorepo vs polyrepo"
    description: |
      Team debates repo structure as service count grows. River advocates
      monorepo; teammate Alex argues polyrepo for CI isolation. Team
      compromises on monorepo with Turborepo. Decision revisited briefly
      around day 510 when CI times spike but upheld.
    startDay: 350
    endDay: 410

  - id: decision-api-versioning
    type: decision
    title: "API versioning strategy"
    description: |
      GraphQL layer needs a versioning approach. Options: URL-based,
      header-based, schema evolution. After evaluating client impact,
      team picks schema evolution with deprecated field annotations.
      Cross-references the GraphQL project.
    startDay: 550
    endDay: 590

  - id: decision-observability
    type: decision
    title: "Observability stack selection"
    description: |
      Prompted by the webhook incident's late detection. Evaluate
      Datadog vs Grafana+Loki vs OpenTelemetry collector. Choose OTEL
      with Grafana backends. Budget constraint drives the decision away
      from Datadog despite team familiarity.
    startDay: 800
    endDay: 845

  # ── Learning ───────────────────────────────────────────────────────────────

  - id: learning-k8s-operators
    type: learning
    title: "Kubernetes operators"
    description: |
      River starts learning operator patterns after the team moves to K8s.
      Progresses from reading docs (day 50), to writing a first operator
      for config management (day 120), to debugging CRD versioning issues
      (day 200), to mentoring a junior on operators (day 250). Early
      learnings about resource limits are important and not revisited —
      tests recency bias resistance.
    startDay: 50
    endDay: 280
    directives:
      - day: 50
        event: "Started reading Kubernetes operator documentation after team decided to move all services to K8s; focused on operator-sdk and kubebuilder frameworks"
      - day: 75
        event: "Completed first operator-sdk tutorial; built a hello-world operator that watches ConfigMap changes and logs diffs — ran it locally against minikube"
      - day: 95
        event: "Documented K8s resource limits and requests behavior — pods without explicit memory limits get OOMKilled under pressure because they default to BestEffort QoS class; set 256Mi default for all Nexus pods"
      - day: 120
        event: "Wrote first production operator — NexusConfigSync operator watches a Git repo and auto-syncs ConfigMaps to target namespaces; handles create, update, and delete with owner references for cleanup"
      - day: 160
        event: "NexusConfigSync operator deployed to staging; managing 214 ConfigMaps across 12 namespaces with average reconciliation time of 1.2 seconds"
      - day: 200
        event: "Hit CRD versioning issue — migrating NexusConfigSync CRD from v1beta1 to v1 broke existing custom resources; had to write a conversion webhook that translates the old spec.gitUrl field to the new spec.source.repository format"
      - day: 250
        event: "Mentored junior engineer Sam on operator patterns; created internal wiki page covering reconciliation loops, owner references, finalizers, and the watch-cache pitfall Sam hit in testing"
      - day: 275
        event: "NexusConfigSync operator has been running in production for 4 months with zero incidents; handles 340+ ConfigMaps now after payments-v2 onboarded"
      - day: 280
        event: "Operator learning arc complete — patterns established as team standard; Sam is now maintaining NexusConfigSync and Alex is using the same patterns for a new CronJob operator"

  - id: learning-ddd
    type: learning
    title: "Domain-driven design"
    description: |
      Prompted by growing service boundaries confusion. River reads Evans'
      book, attends a workshop (day 420), applies bounded contexts to
      the GraphQL federation design, and later uses aggregates pattern
      in the event-driven migration.
    startDay: 400
    endDay: 600

  - id: learning-rust
    type: learning
    title: "Rust for performance-critical services"
    description: |
      Experiments with Rust for a hot-path data transformation service.
      Starts with basic ownership/borrowing (day 650), writes a prototype
      (day 720), benchmarks it against Go version (day 780), team decides
      to keep Go but River continues learning for personal growth.
    startDay: 650
    endDay: 950

  # ── Relationships ──────────────────────────────────────────────────────────

  - id: relationship-alex
    type: relationship
    title: "Code reviews and pairing with Alex"
    description: |
      Alex is a mid-level engineer River mentors. Their interactions span
      code reviews, design discussions, and the monorepo debate. Alex
      eventually leads the event-driven migration's consumer implementation.
      Provides cross-reference material across many arcs.
    startDay: 30
    endDay: 850
    directives:
      - day: 30
        event: "First code review with Alex — reviewed his Go service for order validation; suggested extracting auth middleware into shared package instead of duplicating across services"
      - day: 65
        event: "Paired with Alex on auth migration integration tests; Alex suggested using test containers for Postgres instead of mocking — River agreed and adopted the pattern project-wide"
      - day: 120
        event: "Alex asked about Kubernetes operator patterns over coffee; River walked through the CRD lifecycle and recommended starting with kubebuilder tutorials"
      - day: 200
        event: "Paired with Alex on payments-v2 webhook retry logic; Alex caught a race condition in the idempotency key check that River had missed in his initial implementation"
      - day: 355
        event: "Monorepo debate reached peak intensity — Alex presented a 12-slide deck arguing polyrepo for CI isolation with benchmark data showing 40% faster builds; River countered with cross-service refactoring cost analysis"
      - day: 410
        event: "After monorepo decision settled (Turborepo compromise), Alex acknowledged the shared tooling benefits but noted CI times need quarterly review"
      - day: 500
        event: "Alex promoted to Senior Engineer — River wrote the promo doc highlighting Alex's growth across auth migration testing, webhook reliability fix, and the monorepo CI benchmarks"
      - day: 700
        event: "Alex leading the event-driven migration's consumer implementation; first time River is reviewing Alex's architecture doc rather than the other way around"
      - day: 850
        event: "Alex presented event-driven architecture patterns at Nexus quarterly tech talk; River reflected on 820 days of working together from first code review to Alex designing major systems"

  - id: relationship-pm-dana
    type: relationship
    title: "Product manager Dana syncs"
    description: |
      Weekly syncs with PM Dana cover roadmap priorities, customer escalations,
      and scope negotiations. Dana pushes for faster multi-tenant delivery;
      River advocates for quality. Their disagreement on day 580 about
      skipping schema validation is resolved in River's favor after an
      incident proves the point.
    startDay: 100
    endDay: 700

  # ── Corrections ────────────────────────────────────────────────────────────

  - id: correction-rate-limit
    type: correction
    title: "API rate limit: believed 100rps, actually 1000rps"
    description: |
      River documents the external vendor API as rate-limited to 100rps
      on day 50 (based on outdated docs). Corrected on day 200 when
      load testing reveals the actual limit is 1000rps. The wrong value
      influenced early caching decisions.
    startDay: 50
    endDay: 200
    wrongDay: 50
    correctedDay: 200
    wrongBelief: "Vendor API rate-limited to 100 requests/second"
    correctedBelief: "Actual rate limit is 1000 requests/second (docs were outdated)"
    directives:
      - day: 50
        event: "Documented Acme Logistics API as rate-limited to 100 requests/second based on their v2 API documentation; added rate limit constant to the shared config"
      - day: 75
        event: "Designed request batching layer and local response cache to stay under the 100rps Acme API limit; batches up to 10 shipment tracking requests into a single bulk call"
      - day: 130
        event: "Referenced the 100rps Acme API limit during caching architecture review — the low limit was one of the arguments for choosing Redis as a caching layer to reduce outbound API calls"
      - day: 170
        event: "Started load testing the Acme API integration ahead of payments-v2 launch; testing at 50rps initially to stay well under the documented 100rps ceiling"
      - day: 200
        event: "Load test accidentally hit 800rps against Acme API with zero errors or throttling; contacted Acme support who confirmed actual limit is 1000rps — the v2 docs were outdated and corrected in v3. The batching layer adds unnecessary latency and can be simplified"

  - id: correction-config-drift
    type: correction
    title: "Staging/production config divergence"
    description: |
      Team assumes staging mirrors production config (stated day 300).
      Incident investigation on day 450 reveals 14 config differences
      including different connection pool sizes and feature flags.
      Leads to config-as-code initiative.
    startDay: 300
    endDay: 450
    wrongDay: 300
    correctedDay: 450
    wrongBelief: "Staging environment mirrors production configuration"
    correctedBelief: "14 config differences found including pool sizes and feature flags"

  - id: correction-redis-tls
    type: correction
    title: "Redis TLS configuration"
    description: |
      During multi-tenant security review (day 500), team flags Redis
      as lacking TLS. Day 580: ops team confirms TLS was configured at
      the infrastructure level since initial setup — the application
      config just didn't surface it. False alarm, but it prompted a
      useful security audit.
    startDay: 500
    endDay: 580
    wrongDay: 500
    correctedDay: 580
    wrongBelief: "Redis connections are not encrypted (no TLS)"
    correctedBelief: "TLS was configured at infrastructure level since initial deployment"
