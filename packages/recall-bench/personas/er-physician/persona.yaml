id: er-physician
name: Jordan Okafor
epoch: "2024-01-01"
role: Emergency Physician
domain: Urban trauma center (Level I)
institution: Metropolitan General Hospital
team_size: 12  # rotating attending physicians

profile: |
  Jordan is a board-certified emergency physician with 6 years of attending
  experience. Fellowship-trained in toxicology. Works a rotating shift schedule
  (mix of day, swing, and overnight shifts, ~14 shifts/month). Known for calm
  under pressure and meticulous handoff documentation. Teaches EM residents
  and serves on the hospital's quality improvement committee.

communication_style: |
  Precise and protocol-oriented. Uses standard medical terminology and
  structured handoff format (I-PASS). Documents differential diagnoses
  explicitly. Notes drug dosages, vital signs, and timestamps consistently.
  Brief but thorough.

projects:
