# 2026-01-01 — Tool calls (Memora memorySave invocations)
#
# Each entry below is a single tool call the agent made during the named
# session today. Memora's `memorySave` mutation takes a raw `content`
# string; Memora's own extractor (GPT-5-mini) classifies the text into
# factual / procedural / episodic / working memories and stores
# accordingly. So `content` is plain free-text — whatever the agent
# decided was worth committing to long-term memory.
#
# This file is the tool-call view of the same day captured in
# memories-180d/day-0001.md (the agent's narrative scratchpad / daily
# log). The log is the agent's working memory of what happened; the
# tool calls are what survived as durable memory. Many things that
# appear in the log (process narrative — "I opened the thread", "I
# documented the cadence") do NOT become tool calls; only durable
# facts, preferences, decisions, hard rules, and status milestones do.
#
# Voice rule: the agent doesn't know it lives inside a bounded corpus.
# Memory contents reference real calendar dates ("2026-01-01",
# "by end of January", "in Q1"), not arc-day numbers or simulation
# bookkeeping. Anchor durable items to dates the agent could actually
# observe.

